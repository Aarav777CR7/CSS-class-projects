<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        div{
            background-color: blue;
            padding: 10px;

        }
        div.first{
            opacity: 0.1;

        }
        div.second{
            opacity: 0.3;
            
        }
        div.third{
            opacity: 0.5;
        }
        div.fourth{
            opacity: 0.7;
            
        }
        div.fifth{
            opacity: 1;
            
        }
    </style>
</head>
<body>
    <div class="first">
        Opacity 0.1
    </div>
    <div class="second">
        Opacity 0.3
    </div>
    <div class="third">
        Opacity 0.5
    </div>
    <div class="fourth">
        Opacity 0.7
    </div>
    <div class="fifth">
        Opacity 1
    </div>
</body>
</html>
