<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        div.absolute {
    
            position: absolute;
    
            background-color: crimson;
    
            color: white;
    
            border: 5px solid black;
    
    
        }
    
        div.relative {
    
            position: relative;
    
            background-color: lightblue;
    
            border: 5px solid black;
    
            left: 150px;
    
        }
    </style>
</head>
<body>
    <div class="absolute">Absolute Positioning</div>
    
    <div class="relative">Relative Position</div>
</body>
</html>
