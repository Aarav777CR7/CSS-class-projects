<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        p{
            font-size: 25px;
        }
        .para1{text-transform: uppercase;}
        .para2{text-transform: lowercase;}
        .para3{text-transform: capitalize;}
    </style>
</head>
<body>
    <h1>
        Text Transform
    </h1>
    <p class="para1">
        aarav
    </p>
    <p class="para2">
        AARAV
    </p>
    <p class="para3">
        aarav pandey is the GOAT
    </p>
</body>
</html>
