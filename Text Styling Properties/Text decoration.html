<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        #para1{
            text-decoration: overline;
        }
         #para2{
            text-decoration: underline;
        }
         #para3{
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <h1>
        Text decoration
    </h1>
    <p id="para1">
        Overline
    </p>
    <p id="para2">
        Underline
    </p>
    <p id="para3">
        Line through
    </p>
</body>
</html>
